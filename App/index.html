<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>오늘 뭐 먹지? 🍽️</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body, #root { height: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop 0.35s ease-out; }
  </style>
</head>
<body class="bg-orange-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // 서울 시청 (위치 거부 시 폴백)
    const FALLBACK = { lat: 37.5665, lng: 126.9780, label: "서울 시청 (기본 위치)" };

    const MENUS = [
      { emoji: "🍚", name: "한식",   keyword: "한식" },
      { emoji: "🍲", name: "찌개",   keyword: "찌개" },
      { emoji: "🍜", name: "국밥",   keyword: "국밥" },
      { emoji: "🥩", name: "고기",   keyword: "고기집" },
      { emoji: "🍗", name: "치킨",   keyword: "치킨" },
      { emoji: "🍕", name: "피자",   keyword: "피자" },
      { emoji: "🍔", name: "햄버거", keyword: "햄버거" },
      { emoji: "🍣", name: "초밥",   keyword: "초밥" },
      { emoji: "🍥", name: "라멘",   keyword: "라멘" },
      { emoji: "🍝", name: "파스타", keyword: "파스타" },
      { emoji: "🥘", name: "중식",   keyword: "중국집" },
      { emoji: "🍢", name: "분식",   keyword: "분식" },
      { emoji: "🍤", name: "돈까스", keyword: "돈까스" },
      { emoji: "🍛", name: "카레",   keyword: "카레" },
      { emoji: "🍲", name: "쌀국수", keyword: "쌀국수" },
      { emoji: "🌭", name: "곱창",   keyword: "곱창" },
      { emoji: "🥗", name: "샐러드", keyword: "샐러드" },
      { emoji: "🌮", name: "멕시칸", keyword: "멕시칸" },
    ];

    const RADIUS_OPTIONS = [500, 1000, 2000, 3000];

    // 카카오 SDK 동적 로드
    function loadKakaoSdk(key) {
      return new Promise((resolve, reject) => {
        if (window.kakao && window.kakao.maps && window.kakao.maps.services) {
          resolve();
          return;
        }
        const existing = document.getElementById("kakao-sdk");
        if (existing) existing.remove();
        const s = document.createElement("script");
        s.id = "kakao-sdk";
        s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${encodeURIComponent(key)}&libraries=services&autoload=false`;
        s.onload = () => {
          try {
            window.kakao.maps.load(() => resolve());
          } catch (e) {
            reject(new Error("SDK 초기화 실패"));
          }
        };
        s.onerror = () => reject(new Error("SDK 로드 실패 — 앱 키 또는 도메인 등록을 확인하세요."));
        document.head.appendChild(s);
      });
    }

    function shortCategory(catName) {
      if (!catName) return "음식점";
      const parts = catName.split(">").map((p) => p.trim());
      return parts[parts.length - 1] || "음식점";
    }

    function fmtDistance(d) {
      const n = parseInt(d, 10);
      if (isNaN(n)) return "";
      return n >= 1000 ? `${(n / 1000).toFixed(1)}km` : `${n}m`;
    }

    // 두 좌표 사이 거리(m)
    function haversine(a, b) {
      if (!a || !b) return null;
      const R = 6371000, toRad = (x) => (x * Math.PI) / 180;
      const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
      return Math.round(R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s)));
    }

    // 카카오 결과 → 찜 저장용 객체
    function toFav(r) {
      return {
        place_id: r.id,
        place_name: r.place_name,
        category: shortCategory(r.category_name),
        address: r.road_address_name || r.address_name || "",
        phone: r.phone || "",
        place_url: r.place_url || "",
        x: parseFloat(r.x),
        y: parseFloat(r.y),
      };
    }

    // ── 키 입력 화면 ────────────────────────────────
    function KeySetup({ onSave, error }) {
      const [val, setVal] = useState("");
      return (
        <div className="min-h-full flex items-center justify-center p-6">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl p-7">
            <div className="text-5xl text-center mb-3">🍽️</div>
            <h1 className="text-2xl font-bold text-center text-gray-800">오늘 뭐 먹지?</h1>
            <p className="text-center text-gray-500 mt-1 mb-6 text-sm">시작하려면 카카오 JavaScript 앱 키가 필요해요.</p>

            <input
              type="text"
              value={val}
              onChange={(e) => setVal(e.target.value.trim())}
              placeholder="카카오 JavaScript 앱 키 붙여넣기"
              className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
            />
            {error && <p className="text-red-500 text-sm mt-2">{error}</p>}

            <button
              onClick={() => val && onSave(val)}
              disabled={!val}
              className="w-full mt-4 bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 text-white font-bold py-3 rounded-xl transition"
            >
              시작하기
            </button>

            <div className="mt-6 text-xs text-gray-500 leading-relaxed bg-orange-50 rounded-xl p-4">
              <p className="font-semibold text-gray-700 mb-1">키 발급 방법</p>
              <ol className="list-decimal list-inside space-y-1">
                <li><a className="text-orange-600 underline" href="https://developers.kakao.com" target="_blank" rel="noreferrer">developers.kakao.com</a> 로그인 → 내 애플리케이션 생성</li>
                <li>앱 설정 → 앱 키 → <b>JavaScript 키</b> 복사</li>
                <li>제품 설정 → 카카오맵 <b>ON</b></li>
                <li>앱 설정 → 플랫폼 → Web → 사이트 도메인에<br/> 배포 주소(예: <code>https://whattoeat.vercel.app</code>) 등록</li>
              </ol>
              <p className="mt-2 text-gray-400">키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
            </div>
          </div>
        </div>
      );
    }

    // ── 메인 앱 ────────────────────────────────
    function App() {
      const [kakaoKey, setKakaoKey] = useState(() => localStorage.getItem("kakaoKey") || "");
      const [sdkReady, setSdkReady] = useState(false);
      const [keyError, setKeyError] = useState("");

      const [loc, setLoc] = useState(null);      // {lat,lng,label}
      const [radius, setRadius] = useState(1000);

      const [spinning, setSpinning] = useState(false);
      const [display, setDisplay] = useState(null); // 룰렛 중 표시되는 메뉴
      const [picked, setPicked] = useState(null);    // 최종 뽑힌 메뉴
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchError, setSearchError] = useState("");

      // 찜 (localStorage 저장 — 이 브라우저에만 보관)
      const [favs, setFavs] = useState(() => {
        try { return JSON.parse(localStorage.getItem("favs") || "[]"); } catch (e) { return []; }
      });
      const [view, setView] = useState("search"); // search | favs

      const mapRef = useRef(null);
      const mapObjRef = useRef(null);
      const markersRef = useRef([]);
      const spinTimer = useRef(null);

      // 찜 변경 시 저장
      useEffect(() => {
        localStorage.setItem("favs", JSON.stringify(favs));
      }, [favs]);

      const favIds = new Set(favs.map((f) => f.place_id));

      const toggleFav = useCallback((r) => {
        const pid = r.id;
        setFavs((prev) =>
          prev.some((f) => f.place_id === pid)
            ? prev.filter((f) => f.place_id !== pid)
            : [toFav(r), ...prev]
        );
      }, []);

      const removeFav = useCallback((pid) => {
        setFavs((prev) => prev.filter((f) => f.place_id !== pid));
      }, []);

      // SDK 로드
      useEffect(() => {
        if (!kakaoKey) return;
        let cancelled = false;
        setKeyError("");
        loadKakaoSdk(kakaoKey)
          .then(() => { if (!cancelled) setSdkReady(true); })
          .catch((e) => {
            if (cancelled) return;
            setKeyError(e.message);
            setKakaoKey("");
            localStorage.removeItem("kakaoKey");
          });
        return () => { cancelled = true; };
      }, [kakaoKey]);

      // 위치 가져오기
      useEffect(() => {
        if (!sdkReady) return;
        if (!navigator.geolocation) {
          setLoc({ ...FALLBACK });
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => setLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude, label: "현재 위치" }),
          () => setLoc({ ...FALLBACK }),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
        );
      }, [sdkReady]);

      // 지도 초기화
      useEffect(() => {
        if (!sdkReady || !loc || !mapRef.current || mapObjRef.current) return;
        const kakao = window.kakao;
        mapObjRef.current = new kakao.maps.Map(mapRef.current, {
          center: new kakao.maps.LatLng(loc.lat, loc.lng),
          level: 4,
        });
        // 내 위치 마커
        new kakao.maps.Marker({
          map: mapObjRef.current,
          position: new kakao.maps.LatLng(loc.lat, loc.lng),
          image: new kakao.maps.MarkerImage(
            "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/red_b.png",
            new kakao.maps.Size(28, 40)
          ),
        });
      }, [sdkReady, loc]);

      // 결과 → 지도 마커 갱신
      useEffect(() => {
        const map = mapObjRef.current;
        if (!map || !window.kakao) return;
        const kakao = window.kakao;
        markersRef.current.forEach((m) => m.setMap(null));
        markersRef.current = [];
        if (view !== "search" || !results.length) return;

        const bounds = new kakao.maps.LatLngBounds();
        if (loc) bounds.extend(new kakao.maps.LatLng(loc.lat, loc.lng));

        results.forEach((r, i) => {
          const pos = new kakao.maps.LatLng(parseFloat(r.y), parseFloat(r.x));
          const marker = new kakao.maps.Marker({ map, position: pos });
          const info = new kakao.maps.InfoWindow({
            content: `<div style="padding:5px 8px;font-size:12px;white-space:nowrap;">${i + 1}. ${r.place_name}</div>`,
          });
          kakao.maps.event.addListener(marker, "mouseover", () => info.open(map, marker));
          kakao.maps.event.addListener(marker, "mouseout", () => info.close());
          markersRef.current.push(marker);
          bounds.extend(pos);
        });
        map.setBounds(bounds);
      }, [results, loc, view]);

      const runSearch = useCallback((menu) => {
        if (!window.kakao || !loc) return;
        setSearching(true);
        setSearchError("");
        setResults([]);
        const kakao = window.kakao;
        const ps = new kakao.maps.services.Places();
        ps.keywordSearch(
          menu.keyword,
          (data, status) => {
            setSearching(false);
            if (status === kakao.maps.services.Status.OK) {
              setResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
              setResults([]);
              setSearchError(`반경 ${fmtDistance(radius)} 안에 '${menu.name}' 식당이 없어요. 반경을 넓혀보세요.`);
            } else {
              setSearchError("검색 중 오류가 발생했어요.");
            }
          },
          {
            location: new kakao.maps.LatLng(loc.lat, loc.lng),
            radius: radius,
            sort: kakao.maps.services.SortBy.DISTANCE,
            size: 15,
            category_group_code: "FD6", // 음식점
          }
        );
      }, [loc, radius]);

      const spin = useCallback(() => {
        if (spinning || !loc) return;
        setView("search");
        setSpinning(true);
        setPicked(null);
        setResults([]);
        setSearchError("");

        const target = MENUS[Math.floor(Math.random() * MENUS.length)];
        let ticks = 0;
        const total = 18 + Math.floor(Math.random() * 6);

        clearInterval(spinTimer.current);
        spinTimer.current = setInterval(() => {
          ticks++;
          if (ticks >= total) {
            clearInterval(spinTimer.current);
            setDisplay(target);
            setPicked(target);
            setSpinning(false);
            runSearch(target);
          } else {
            setDisplay(MENUS[Math.floor(Math.random() * MENUS.length)]);
          }
        }, 80);
      }, [spinning, loc, runSearch]);

      useEffect(() => () => clearInterval(spinTimer.current), []);

      const resetKey = () => {
        localStorage.removeItem("kakaoKey");
        setKakaoKey("");
        setSdkReady(false);
      };

      if (!kakaoKey) {
        return <KeySetup onSave={(k) => { localStorage.setItem("kakaoKey", k); setKakaoKey(k); }} error={keyError} />;
      }

      const current = display || picked;

      return (
        <div className="min-h-full max-w-md mx-auto flex flex-col">
          {/* 헤더 */}
          <header className="px-5 pt-6 pb-3 flex items-center justify-between gap-2">
            <h1 className="text-xl font-bold text-gray-800">🍽️ 오늘 뭐 먹지?</h1>
            <button onClick={resetKey} className="text-xs text-gray-400 hover:text-gray-600">키 변경</button>
          </header>

          {/* 탭 */}
          <div className="px-5 flex gap-2 mb-1">
            <button onClick={() => setView("search")}
              className={`px-3 py-1.5 rounded-full text-sm font-semibold transition ${view === "search" ? "bg-orange-500 text-white" : "bg-white text-gray-500 shadow-sm"}`}>
              🎯 추천
            </button>
            <button onClick={() => setView("favs")}
              className={`px-3 py-1.5 rounded-full text-sm font-semibold transition ${view === "favs" ? "bg-orange-500 text-white" : "bg-white text-gray-500 shadow-sm"}`}>
              ⭐ 찜 {favs.length > 0 && `(${favs.length})`}
            </button>
          </div>

          {view === "search" && (<>
          {/* 위치 + 반경 */}
          <div className="px-5 flex items-center gap-2 flex-wrap text-sm">
            <span className="inline-flex items-center gap-1 bg-white rounded-full px-3 py-1 shadow-sm text-gray-600">
              📍 {loc ? loc.label : "위치 확인 중…"}
            </span>
            <div className="inline-flex items-center gap-1 bg-white rounded-full px-2 py-1 shadow-sm">
              <span className="text-gray-500 pl-1">반경</span>
              {RADIUS_OPTIONS.map((r) => (
                <button
                  key={r}
                  onClick={() => setRadius(r)}
                  className={`px-2 py-0.5 rounded-full text-xs transition ${radius === r ? "bg-orange-500 text-white" : "text-gray-500 hover:bg-orange-50"}`}
                >
                  {r >= 1000 ? `${r / 1000}km` : `${r}m`}
                </button>
              ))}
            </div>
          </div>

          {/* 룰렛 카드 */}
          <div className="px-5 mt-4">
            <div className="bg-white rounded-3xl shadow-lg p-6 text-center">
              {current ? (
                <div className={spinning ? "" : "animate-pop"} key={current.name + (spinning ? "s" : "p")}>
                  <div className="text-7xl mb-1">{current.emoji}</div>
                  <div className="text-2xl font-bold text-gray-800">{current.name}</div>
                </div>
              ) : (
                <div className="py-4">
                  <div className="text-7xl mb-1">🎲</div>
                  <div className="text-gray-400">버튼을 눌러 오늘의 메뉴를 뽑아보세요!</div>
                </div>
              )}

              <button
                onClick={spin}
                disabled={spinning || !loc}
                className="w-full mt-5 bg-orange-500 hover:bg-orange-600 active:scale-95 disabled:bg-gray-300 text-white text-lg font-bold py-3.5 rounded-2xl transition"
              >
                {spinning ? "고르는 중…" : picked ? "다시 뽑기 🔄" : "뭐 먹지? 🎯"}
              </button>
            </div>
          </div>

          {/* 지도 */}
          <div className="px-5 mt-4">
            <div ref={mapRef} className="w-full h-52 rounded-2xl shadow-md bg-gray-200" />
          </div>

          {/* 결과 목록 */}
          <div className="px-5 mt-4 pb-8 flex-1">
            {searching && <p className="text-center text-gray-500 py-6">주변 식당을 찾고 있어요… 🔍</p>}
            {searchError && <p className="text-center text-gray-500 py-6 text-sm">{searchError}</p>}

            {!searching && results.length > 0 && (
              <>
                <h2 className="text-sm font-semibold text-gray-500 mb-2">
                  근처 <b className="text-orange-600">{picked?.name}</b> 맛집 {results.length}곳
                </h2>
                <ul className="space-y-2">
                  {results.map((r, i) => (
                    <li key={r.id} className="bg-white rounded-2xl shadow-sm hover:shadow-md p-4 transition">
                      <div className="flex items-start justify-between gap-3">
                        <a href={r.place_url} target="_blank" rel="noreferrer" className="block min-w-0">
                          <div className="flex items-center gap-2">
                            <span className="text-orange-500 font-bold text-sm">{i + 1}</span>
                            <span className="font-semibold text-gray-800 truncate">{r.place_name}</span>
                          </div>
                          <p className="text-xs text-gray-500 mt-1">{shortCategory(r.category_name)}</p>
                          <p className="text-xs text-gray-400 mt-0.5 truncate">{r.road_address_name || r.address_name}</p>
                          {r.phone && <p className="text-xs text-gray-400 mt-0.5">📞 {r.phone}</p>}
                        </a>
                        <div className="shrink-0 flex flex-col items-end gap-1.5">
                          <button onClick={() => toggleFav(r)} title="찜하기"
                            className="text-xl leading-none hover:scale-110 transition">
                            {favIds.has(r.id) ? "⭐" : "☆"}
                          </button>
                          <span className="text-xs font-semibold text-orange-600 bg-orange-50 rounded-full px-2.5 py-1">
                            {fmtDistance(r.distance)}
                          </span>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              </>
            )}
          </div>
          </>)}

          {/* 찜 목록 뷰 */}
          {view === "favs" && (
            <div className="px-5 mt-3 pb-8 flex-1">
              {favs.length === 0 ? (
                <div className="text-center text-gray-400 py-16">
                  <div className="text-5xl mb-3">⭐</div>
                  <p className="text-sm">아직 찜한 식당이 없어요.<br/>추천 결과에서 ☆를 눌러 저장해보세요.</p>
                </div>
              ) : (
                <ul className="space-y-2">
                  {favs.map((f) => {
                    const dist = loc ? haversine(loc, { lat: f.y, lng: f.x }) : null;
                    return (
                      <li key={f.place_id} className="bg-white rounded-2xl shadow-sm p-4">
                        <div className="flex items-start justify-between gap-3">
                          <a href={f.place_url} target="_blank" rel="noreferrer" className="block min-w-0">
                            <span className="font-semibold text-gray-800 truncate block">{f.place_name}</span>
                            <p className="text-xs text-gray-500 mt-1">{f.category}</p>
                            <p className="text-xs text-gray-400 mt-0.5 truncate">{f.address}</p>
                            {f.phone && <p className="text-xs text-gray-400 mt-0.5">📞 {f.phone}</p>}
                          </a>
                          <div className="shrink-0 flex flex-col items-end gap-1.5">
                            <button onClick={() => removeFav(f.place_id)} title="찜 해제"
                              className="text-xl leading-none hover:scale-110 transition">⭐</button>
                            {dist != null && (
                              <span className="text-xs font-semibold text-orange-600 bg-orange-50 rounded-full px-2.5 py-1">
                                {fmtDistance(dist)}
                              </span>
                            )}
                          </div>
                        </div>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
