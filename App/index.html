  <style>
    :root {
      --paper: #FBF8F1;
      --paper2: #F1EDDF;
      --paper3: #E7E1CE;
      --ink: #211E19;
      --muted: #8C8672;
      --line: #D8D2BE;
      --stamp: #C6362E;
    }
    html, body, #root { height: 100%; }
    body {
      -webkit-tap-highlight-color: transparent;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Nanum Gothic Coding', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop { animation: pop 0.35s ease-out; }

    .muted { color: var(--muted); }
    .stamp-text { color: var(--stamp); }

    .rc-card { border: 1.5px solid var(--line); border-radius: 2px; background: var(--paper); }
    .rc-box { border: 1px solid var(--line); border-radius: 2px; background: var(--paper2); }

    .rc-input { border: 1px solid var(--line); border-radius: 0; background: transparent; color: var(--ink); }
    .rc-input:focus { outline: none; border-color: var(--ink); }
    .rc-input::placeholder { color: var(--muted); }

    .rc-btn { background: var(--ink); color: var(--paper); border-radius: 2px; }
    .rc-btn:disabled { background: #C9C2AE; color: var(--paper); }

    .rc-tab { border: 1px solid var(--line); color: #5B5646; border-radius: 999px; }
    .rc-tab.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    .rc-pill { border: 1px solid var(--line); color: #5B5646; border-radius: 999px; }
    .rc-pill.on { background: var(--stamp); color: #fff; border-color: var(--stamp); }

    .rc-chip { border: 1px solid var(--line); color: var(--muted); border-radius: 2px; }
    .rc-chip.on {
      border: 1px solid var(--ink); color: var(--ink); font-weight: 700;
      background: repeating-linear-gradient(135deg, var(--paper2), var(--paper2) 2px, var(--paper3) 2px, var(--paper3) 4px);
    }

    .stamp-tag {
      display: inline-block; padding: 3px 10px;
      border: 1.5px solid var(--stamp); color: var(--stamp);
      font-size: 10px; letter-spacing: .08em; border-radius: 3px; transform: rotate(-4deg);
    }

    .dash-y { border-top: 1.5px dashed var(--line); border-bottom: 1.5px dashed var(--line); }
    .dash-b { border-bottom: 1.5px dashed var(--line); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .sheet {
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -6px 20px -8px rgba(33, 30, 25, 0.28);
      z-index: 40;
    }

    .map-hint {
      z-index: 40;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: 0 2px 8px -2px rgba(33, 30, 25, 0.25);
    }
  </style>

          return;
        }
        const existing = document.getElementById("kakao-sdk");
        if (existing) existing.remove();
        const s = document.createElement("script");
        s.id = "kakao-sdk";
        s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${encodeURIComponent(key)}&libraries=services&autoload=false`;
        s.onload = () => {
          try {
            window.kakao.maps.load(() => resolve());
          } catch (e) {
            reject(new Error("SDK 초기화 실패"));
          }
        };
        s.onerror = () => reject(new Error("SDK 로드 실패 — 앱 키 또는 도메인 등록을 확인하세요."));
        document.head.appendChild(s);
      });
    }

    // 카카오 place_url이 http로 오는 경우가 있어, https 페이지 안에서 iframe이 혼합 콘텐츠로 막히지 않게 변환
    function toHttps(url) {
      return url ? url.replace(/^http:\/\//, "https://") : url;
    }

    function shortCategory(catName) {
      if (!catName) return "음식점";
      const parts = catName.split(">").map((p) => p.trim());
      return parts[parts.length - 1] || "음식점";
    }

    function fmtDistance(d) {
      const n = parseInt(d, 10);
      if (isNaN(n)) return "";
      return n >= 1000 ? `${(n / 1000).toFixed(1)}km` : `${n}m`;
    }

    // 두 좌표 사이 거리(m)
    function haversine(a, b) {
      if (!a || !b) return null;
      const R = 6371000, toRad = (x) => (x * Math.PI) / 180;
      const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
      return Math.round(R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s)));
    }

    // 카카오 결과 → 찜 저장용 객체
    function toFav(r) {
      return {
        place_id: r.id,
        place_name: r.place_name,
        category: shortCategory(r.category_name),
        address: r.road_address_name || r.address_name || "",
        phone: r.phone || "",
        place_url: toHttps(r.place_url) || "",
        x: parseFloat(r.x),
        y: parseFloat(r.y),
        note: "",
      };
    }

    // ── 키 입력 화면 ────────────────────────────────
    function KeySetup({ onSave, error }) {
      const [val, setVal] = useState("");
      return (
        <div className="h-full flex items-center justify-center p-6 overflow-y-auto">
          <div className="w-full max-w-md rc-card p-7">
            <div className="text-5xl text-center mb-3">🍽️</div>
            <h1 className="text-2xl font-bold text-center uppercase tracking-wide">오늘 뭐 먹지?</h1>
            <p className="text-center muted mt-1 mb-6 text-sm">시작하려면 카카오 JavaScript 앱 키가 필요해요.</p>

            <input
              type="text"
              value={val}
              onChange={(e) => setVal(e.target.value.trim())}
              placeholder="카카오 JavaScript 앱 키 붙여넣기"
              className="w-full rc-input px-4 py-3 text-sm"
            />
            {error && <p className="stamp-text text-sm mt-2">{error}</p>}

            <button
              onClick={() => val && onSave(val)}
              disabled={!val}
              className="w-full mt-4 rc-btn font-bold py-3 transition"
            >
              시작하기
            </button>

            <div className="mt-6 text-xs muted leading-relaxed rc-box p-4">
              <p className="font-semibold" style={{ color: "var(--ink)" }}>키 발급 방법</p>
              <ol className="list-decimal list-inside space-y-1 mt-1">
                <li><a className="stamp-text underline" href="https://developers.kakao.com" target="_blank" rel="noreferrer">developers.kakao.com</a> 로그인 → 내 애플리케이션 생성</li>
                <li>앱 설정 → 앱 키 → <b>JavaScript 키</b> 복사</li>
                <li>제품 설정 → 카카오맵 <b>ON</b></li>
                <li>앱 설정 → 플랫폼 → Web → 사이트 도메인에<br/> 배포 주소(예: <code>https://whattoeat.vercel.app</code>) 등록</li>
              </ol>
              <p className="mt-2">키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
            </div>
          </div>
        </div>
      );
    }

    // ── 메인 앱 ────────────────────────────────
    function App() {
      const [kakaoKey, setKakaoKey] = useState(() => localStorage.getItem("kakaoKey") || DEFAULT_KAKAO_KEY);
      const [sdkReady, setSdkReady] = useState(false);
      const [keyError, setKeyError] = useState("");

      // 위치 저장 — 이전에 저장한 위치가 있으면 그걸로 시작 (직접 고친 위치가 앱을 껐다 켜도 유지됨)
      const [loc, setLoc] = useState(() => {
        try { return JSON.parse(localStorage.getItem("loc")) || null; } catch (e) { return null; }
      });
      const [radius, setRadius] = useState(1000);

      useEffect(() => {
        if (loc) localStorage.setItem("loc", JSON.stringify(loc));
      }, [loc]);

      // 이름 붙여 저장해두는 위치 목록 (집, 회사 등)
      const [savedLocs, setSavedLocs] = useState(() => {
        try { return JSON.parse(localStorage.getItem("savedLocs")) || []; } catch (e) { return []; }
      });
      useEffect(() => {
        localStorage.setItem("savedLocs", JSON.stringify(savedLocs));
      }, [savedLocs]);

      // 룰렛에 포함할 카테고리 (기본: 전체 해제, 중복 선택 가능)
      const [selectedCats, setSelectedCats] = useState(() => new Set());
      const toggleCat = useCallback((name) => {
        setSelectedCats((prev) => {
          const next = new Set(prev);
          next.has(name) ? next.delete(name) : next.add(name);
          return next;
        });
      }, []);
      const catPool = MENUS.filter((m) => selectedCats.has(m.name));

      const [picked, setPicked] = useState(null);    // 선택된 카테고리
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchError, setSearchError] = useState("");
      const [selectedPlace, setSelectedPlace] = useState(null); // 하단 시트에 상세로 띄운 장소
      const [menuUrl, setMenuUrl] = useState(null); // 카카오맵 페이지를 iframe으로 보여줄 때의 주소

      // 찜 (localStorage 저장 — 이 브라우저에만 보관)
      const [favs, setFavs] = useState(() => {
        try { return JSON.parse(localStorage.getItem("favs") || "[]"); } catch (e) { return []; }
      });
      const [view, setView] = useState("search"); // search | favs

      const mapRef = useRef(null);
      const mapObjRef = useRef(null);
      const myMarkerRef = useRef(null);
      const markersRef = useRef([]);

      // 찜 변경 시 저장
      useEffect(() => {
        localStorage.setItem("favs", JSON.stringify(favs));
      }, [favs]);

      const favIds = new Set(favs.map((f) => f.place_id));

      const toggleFav = useCallback((r) => {
        const pid = r.id;
        setFavs((prev) =>
          prev.some((f) => f.place_id === pid)
            ? prev.filter((f) => f.place_id !== pid)
            : [toFav(r), ...prev]
        );
      }, []);

      const removeFav = useCallback((pid) => {
        setFavs((prev) => prev.filter((f) => f.place_id !== pid));
      }, []);

      const updateFavNote = useCallback((pid, note) => {
        setFavs((prev) => prev.map((f) => (f.place_id === pid ? { ...f, note } : f)));
      }, []);

      // 검색 결과 항목 → 하단 시트에 상세 표시
      const showResultDetail = useCallback((r) => {
        const fav = favs.find((f) => f.place_id === r.id);
        setSelectedPlace({
          id: r.id,
          name: r.place_name,
          category: shortCategory(r.category_name),
          address: r.road_address_name || r.address_name || "",
          phone: r.phone || "",
          place_url: toHttps(r.place_url) || "",
          distance: fmtDistance(r.distance),
          isFav: !!fav,
          note: fav ? fav.note || "" : "",
          raw: r,
        });
      }, [favs]);

      // 찜 항목 → 하단 시트에 상세 표시
      const showFavDetail = useCallback((f) => {
        const dist = loc ? haversine(loc, { lat: f.y, lng: f.x }) : null;
        setSelectedPlace({
          id: f.place_id,
          name: f.place_name,
          category: f.category,
          address: f.address,
          phone: f.phone,
          place_url: toHttps(f.place_url),
          distance: dist != null ? fmtDistance(dist) : "",
          isFav: true,
          note: f.note || "",
          raw: f,
        });
      }, [loc]);

      const toggleFavFromDetail = useCallback(() => {
        setSelectedPlace((p) => {
          if (!p) return p;
          if (p.isFav) {
            removeFav(p.id);
          } else {
            toggleFav(p.raw);
          }
          return { ...p, isFav: !p.isFav };
        });
      }, [toggleFav, removeFav]);

      const changeNote = useCallback((id, note) => {
        setSelectedPlace((p) => (p ? { ...p, note } : p));
        updateFavNote(id, note);
      }, [updateFavNote]);

      // SDK 로드
      useEffect(() => {
        if (!kakaoKey) return;
        let cancelled = false;
        setKeyError("");
        loadKakaoSdk(kakaoKey)
          .then(() => { if (!cancelled) setSdkReady(true); })
          .catch((e) => {
            if (cancelled) return;
            setKeyError(e.message);
            setKakaoKey("");
            localStorage.removeItem("kakaoKey");
          });
        return () => { cancelled = true; };
      }, [kakaoKey]);

      // 위치 가져오기 — 저장된 위치가 있으면 그대로 쓰고, 없을 때만 GPS로 새로 조회
      useEffect(() => {
        if (!sdkReady || loc) return;
        if (!navigator.geolocation) {
          setLoc({ ...FALLBACK });
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => setLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude, label: "현재 위치" }),
          () => setLoc({ ...FALLBACK }),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
        );
      }, [sdkReady]);

      // GPS로 위치 다시 찾기 — 이동 후 이미 뽑힌 카테고리가 있으면 그 자리에서 바로 재검색
      const relocate = useCallback(() => {
        const applyLoc = (next) => {
          setLoc(next);
          const { picked: currentPicked, runSearch: currentRunSearch } = latestRef.current;
          if (currentPicked) currentRunSearch(currentPicked, next);
        };
        if (!navigator.geolocation) { applyLoc({ ...FALLBACK }); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => applyLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude, label: "현재 위치" }),
          () => applyLoc({ ...FALLBACK }),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );
      }, []);

      // 현재 위치를 이름 붙여 저장
      const saveCurrentLoc = useCallback(() => {
        if (!loc) return;
        const name = window.prompt("이 위치를 어떤 이름으로 저장할까요? (예: 집, 회사)");
        if (!name || !name.trim()) return;
        setSavedLocs((prev) => [...prev, { id: String(Date.now()), name: name.trim(), lat: loc.lat, lng: loc.lng }]);
      }, [loc]);

      // 저장된 위치로 전환 — 이미 뽑힌 카테고리가 있으면 그 자리에서 바로 재검색
      const selectSavedLoc = useCallback((s) => {
        const next = { lat: s.lat, lng: s.lng, label: `📍 ${s.name}` };
        setLoc(next);
        const { picked: currentPicked, runSearch: currentRunSearch } = latestRef.current;
        if (currentPicked) currentRunSearch(currentPicked, next);
      }, []);

      const deleteSavedLoc = useCallback((id) => {
        setSavedLocs((prev) => prev.filter((s) => s.id !== id));
      }, []);

      // 지도 초기화 (최초 1회) — 내 위치 마커는 드래그·지도 클릭으로 직접 보정 가능
      useEffect(() => {
        if (!sdkReady || !loc || !mapRef.current || mapObjRef.current) return;
        const kakao = window.kakao;
        const map = new kakao.maps.Map(mapRef.current, {
          center: new kakao.maps.LatLng(loc.lat, loc.lng),
          level: 4,
        });
        mapObjRef.current = map;

        // 📌 압정 모양의 얇은 핀 (빨간색)
        const myLocSvg = `data:image/svg+xml;utf8,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="34" viewBox="0 0 20 34">` +
          `<path d="M7 11 L13 11 L10 32 Z" fill="#C6362E"/>` +
          `<circle cx="10" cy="7" r="6.5" fill="#C6362E" stroke="#FFFFFF" stroke-width="1.5"/>` +
          `</svg>`
        )}`;
        const marker = new kakao.maps.Marker({
          map,
          position: new kakao.maps.LatLng(loc.lat, loc.lng),
          image: new kakao.maps.MarkerImage(
            myLocSvg,
            new kakao.maps.Size(20, 34),
            { offset: new kakao.maps.Point(10, 32) }
          ),
          draggable: true,
          zIndex: 10,
        });
        myMarkerRef.current = marker;

        const geocoder = new kakao.maps.services.Geocoder();
        const applyManualLoc = (latlng) => {
          const next = { lat: latlng.getLat(), lng: latlng.getLng(), label: "직접 설정한 위치 📌" };
          setLoc(next);
          const { picked: currentPicked, runSearch: currentRunSearch } = latestRef.current;
          if (currentPicked) currentRunSearch(currentPicked, next);

          // 좌표 → 주소/장소명으로 변환해서 라벨 갱신
          geocoder.coord2Address(next.lng, next.lat, (result, status) => {
            if (status !== kakao.maps.services.Status.OK || !result[0]) return;
            const addr = (result[0].road_address && result[0].road_address.address_name) ||
                         (result[0].address && result[0].address.address_name);
            if (!addr) return;
            setLoc((prev) => (prev && prev.lat === next.lat && prev.lng === next.lng ? { ...prev, label: `📌 ${addr}` } : prev));
          });
        };

        kakao.maps.event.addListener(marker, "dragend", () => applyManualLoc(marker.getPosition()));
        kakao.maps.event.addListener(map, "click", (mouseEvent) => {
          marker.setPosition(mouseEvent.latLng);
          applyManualLoc(mouseEvent.latLng);
        });
      }, [sdkReady, loc]);

      // loc이 외부에서 바뀌면(GPS 재조회 등) 마커·지도 중심도 함께 맞춤
      useEffect(() => {
        if (!mapObjRef.current || !myMarkerRef.current || !loc) return;
        const kakao = window.kakao;
        const pos = new kakao.maps.LatLng(loc.lat, loc.lng);
        myMarkerRef.current.setPosition(pos);
        mapObjRef.current.setCenter(pos);
      }, [loc]);

      // 결과 → 지도 마커 갱신
      useEffect(() => {
        const map = mapObjRef.current;
        if (!map || !window.kakao) return;
        const kakao = window.kakao;
        markersRef.current.forEach((m) => m.setMap(null));
        markersRef.current = [];
        if (view !== "search" || !results.length) return;

        const bounds = new kakao.maps.LatLngBounds();
        if (loc) bounds.extend(new kakao.maps.LatLng(loc.lat, loc.lng));

        results.forEach((r, i) => {
          const pos = new kakao.maps.LatLng(parseFloat(r.y), parseFloat(r.x));
          const marker = new kakao.maps.Marker({ map, position: pos });
          const info = new kakao.maps.InfoWindow({
            content: `<div style="padding:5px 8px;font-size:12px;white-space:nowrap;">${i + 1}. ${r.place_name}</div>`,
          });
          kakao.maps.event.addListener(marker, "mouseover", () => info.open(map, marker));
          kakao.maps.event.addListener(marker, "mouseout", () => info.close());
          kakao.maps.event.addListener(marker, "click", () => showResultDetailRef.current(r));
          markersRef.current.push(marker);
          bounds.extend(pos);
        });
        map.setBounds(bounds);
      }, [results, loc, view]);

      // 지도 마커 클릭 핸들러가 항상 최신 showResultDetail을 참조하도록
      const showResultDetailRef = useRef(showResultDetail);
      useEffect(() => { showResultDetailRef.current = showResultDetail; });

      const runSearch = useCallback((menu, atLoc) => {
        const searchLoc = atLoc || loc;
        if (!window.kakao || !searchLoc) return;
        setSelectedPlace(null);
        setMenuUrl(null);
        setSearching(true);
        setSearchError("");
        setResults([]);
        const kakao = window.kakao;
        const ps = new kakao.maps.services.Places();
        ps.keywordSearch(
          menu.keyword,
          (data, status) => {
            setSearching(false);
            if (status === kakao.maps.services.Status.OK) {
              setResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
              setResults([]);
              setSearchError(`반경 ${fmtDistance(radius)} 안에 '${menu.name}' 식당이 없어요. 반경을 넓혀보세요.`);
            } else {
              setSearchError("검색 중 오류가 발생했어요.");
            }
          },
          {
            location: new kakao.maps.LatLng(searchLoc.lat, searchLoc.lng),
            radius: radius,
            sort: kakao.maps.services.SortBy.DISTANCE,
            size: 15,
            category_group_code: "FD6", // 음식점
          }
        );
      }, [loc, radius]);

      // 드래그·클릭 핸들러(최초 1회만 등록)가 항상 최신 picked/runSearch를 참조하도록
      const latestRef = useRef({});
      useEffect(() => {
        latestRef.current = { picked, runSearch };
      });

      // 카테고리 칩을 누르면 그 자리에서 바로 검색
      const selectCategory = useCallback((m) => {
        toggleCat(m.name);
        setPicked(m);
        setSelectedPlace(null);
        setMenuUrl(null);
        runSearch(m);
      }, [toggleCat, runSearch]);

      const resetKey = () => {
        localStorage.removeItem("kakaoKey");
        setKakaoKey("");
        setSdkReady(false);
      };

      if (!kakaoKey) {
        return <KeySetup onSave={(k) => { localStorage.setItem("kakaoKey", k); setKakaoKey(k); }} error={keyError} />;
      }

      return (
        <div className="min-h-full max-w-md mx-auto flex flex-col">
          {/* 상단 고정 영역 */}
          <div className="shrink-0">
            {/* 헤더 + 탭 */}
            <div className="px-4 pt-3 pb-2 flex items-center justify-between gap-2 dash-b">
              <h1 className="text-base font-bold uppercase tracking-wide">🍽️ 오늘 뭐 먹지?</h1>
              <div className="flex items-center gap-2">
                <button onClick={() => { setView("search"); setSelectedPlace(null); setMenuUrl(null); }}
                  className={`px-2.5 py-1 rc-tab text-xs font-semibold transition ${view === "search" ? "on" : ""}`}>
                  🎯 추천
                </button>
                <button onClick={() => { setView("favs"); setSelectedPlace(null); setMenuUrl(null); }}
                  className={`px-2.5 py-1 rc-tab text-xs font-semibold transition ${view === "favs" ? "on" : ""}`}>
                  ⭐ 찜 {favs.length > 0 && `(${favs.length})`}
                </button>
                <button onClick={resetKey} className="text-[10px] muted hover:opacity-70">키변경</button>
              </div>
            </div>

            {view === "search" && (<>
              {/* 위치 */}
              <div className="px-4 py-2 flex items-center gap-1.5 overflow-x-auto no-scrollbar text-xs whitespace-nowrap">
                <span className="inline-flex items-center gap-1 rc-pill px-2.5 py-1 shrink-0">
                  📍 {loc ? loc.label : "위치 확인 중…"}
                </span>
                <button onClick={relocate} className="rc-pill px-2.5 py-1 shrink-0 hover:opacity-70">
                  GPS로 다시 찾기
                </button>
              </div>

              {/* 저장된 위치 */}
              <div className="px-4 pb-2 flex items-center gap-1.5 overflow-x-auto no-scrollbar text-xs whitespace-nowrap">
                <button onClick={saveCurrentLoc} disabled={!loc} className="rc-pill px-2.5 py-1 shrink-0 hover:opacity-70">
                  ＋ 이 위치 저장
                </button>
                {savedLocs.map((s) => (
                  <span key={s.id} className="inline-flex items-center rc-pill pl-2.5 pr-1 py-1 shrink-0 gap-1">
                    <button onClick={() => selectSavedLoc(s)} className="font-semibold">{s.name}</button>
                    <button onClick={() => deleteSavedLoc(s.id)} className="muted px-1 hover:opacity-70">✕</button>
                  </span>
                ))}
              </div>

              {/* 반경 */}
              <div className="px-4 pb-2 flex items-center gap-1.5 text-xs">
                <span className="muted">반경</span>
                {RADIUS_OPTIONS.map((r) => (
                  <button
                    key={r}
                    onClick={() => setRadius(r)}
                    className={`px-2.5 py-1 rc-pill transition ${radius === r ? "on" : ""}`}
                  >
                    {r >= 1000 ? `${r / 1000}km` : `${r}m`}
                  </button>
                ))}
              </div>

              {/* 카테고리 필터 (한 화면에 모두 표시, 중복 선택 가능) */}
              <div className="px-4 pb-2">
                <div className="flex items-center gap-1.5 text-xs mb-1.5">
                  <span className="muted">카테고리({catPool.length}/{MENUS.length})</span>
                  <button onClick={() => setSelectedCats(new Set(MENUS.map((m) => m.name)))} className="stamp-text hover:underline">전체</button>
                  <button onClick={() => setSelectedCats(new Set())} className="muted hover:underline">해제</button>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  {MENUS.map((m) => (
                    <button
                      key={m.name}
                      onClick={() => selectCategory(m)}
                      disabled={!loc}
                      className={`px-2 py-1 rc-chip text-xs transition ${selectedCats.has(m.name) ? "on" : ""}`}
                    >
                      {m.emoji} {m.name}
                    </button>
                  ))}
                </div>
              </div>

            </>)}
          </div>

          {/* 네이버지도 형식: 지도는 가로 폭에 맞춘 정사각형 */}
          <div className="relative w-full aspect-square mb-3">
            <div ref={mapRef} className="absolute inset-0" style={{ background: "var(--paper2)" }} />

            <div className="map-hint absolute top-2 left-1/2 -translate-x-1/2 px-3 py-1 text-[10px] muted whitespace-nowrap">
              📌 탭하거나 핀을 드래그해 위치 수정
            </div>
          </div>

          {/* 결과/상세 — 페이지 전체와 함께 자연스럽게 스크롤 (중첩 스크롤 없음) */}
          <div className="sheet w-full flex flex-col mb-4">
            <div className="mx-auto mt-2 h-1 w-10 rounded-full shrink-0" style={{ background: "var(--line)" }} />

              {selectedPlace ? (
                <div className="px-4 pt-2 pb-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="text-base font-bold truncate">{selectedPlace.name}</div>
                      <div className="text-xs muted mt-0.5">
                        {selectedPlace.category}{selectedPlace.distance && ` · ${selectedPlace.distance}`}
                      </div>
                    </div>
                    <button onClick={() => { setSelectedPlace(null); setMenuUrl(null); }} className="text-xl leading-none muted hover:opacity-70 shrink-0">✕</button>
                  </div>
                  {selectedPlace.address && <p className="text-sm mt-2">{selectedPlace.address}</p>}
                  {selectedPlace.phone && <p className="text-sm muted mt-1">📞 {selectedPlace.phone}</p>}
                  <div className="flex gap-2 mt-3">
                    <button onClick={toggleFavFromDetail} className="flex-1 rc-tab py-2 text-sm font-semibold">
                      {selectedPlace.isFav ? "⭐ 찜 해제" : "☆ 찜하기"}
                    </button>
                    {selectedPlace.place_url && (
                      <button onClick={() => setMenuUrl(selectedPlace.place_url)}
                        className="flex-1 rc-btn py-2 text-sm font-semibold text-center">
                        🍽️ 메뉴 보기
                      </button>
                    )}
                  </div>
                  {selectedPlace.isFav && (
                    <input
                      type="text"
                      value={selectedPlace.note}
                      onChange={(e) => changeNote(selectedPlace.id, e.target.value)}
                      placeholder="메모 추가 (예: 김치찌개 맛집, 웨이팅 있음)"
                      className="w-full rc-input px-3 py-2 text-sm mt-2"
                    />
                  )}
                </div>
              ) : view === "search" ? (
                <div className="px-4 pt-1 pb-4">
                  {searching && <p className="text-center muted py-6 text-sm">주변 식당을 찾고 있어요… 🔍</p>}
                  {searchError && <p className="text-center muted py-6 text-sm">{searchError}</p>}
                  {!searching && !searchError && results.length === 0 && (
                    <p className="text-center muted py-6 text-sm">메뉴를 뽑거나 카테고리를 눌러보세요!</p>
                  )}
                  {!searching && results.length > 0 && (
                    <>
                      <h2 className="text-xs font-semibold muted my-2">
                        근처 <b className="stamp-text">{picked?.name}</b> 맛집 {results.length}곳
                      </h2>
                      <ul>
                        {results.map((r, i) => (
                          <li key={r.id} className="dash-b flex items-center gap-2 py-2.5">
                            <button onClick={() => showResultDetail(r)} className="flex-1 min-w-0 flex items-center gap-2 text-left">
                              <span className="stamp-text font-bold text-xs shrink-0">{i + 1}</span>
                              <span className="font-semibold truncate text-sm">{r.place_name}</span>
                              <span className="text-xs stamp-text font-semibold shrink-0 ml-auto">{fmtDistance(r.distance)}</span>
                            </button>
                            <button onClick={() => toggleFav(r)} className="text-lg leading-none shrink-0">
                              {favIds.has(r.id) ? "⭐" : "☆"}
                            </button>
                          </li>
                        ))}
                      </ul>
                    </>
                  )}
                </div>
              ) : (
                <div className="px-4 pt-1 pb-4">
                  {favs.length === 0 ? (
                    <div className="text-center muted py-10">
                      <div className="text-4xl mb-2">⭐</div>
                      <p className="text-sm">아직 찜한 식당이 없어요.<br/>추천 결과에서 ☆를 눌러 저장해보세요.</p>
                    </div>
                  ) : (
                    <ul>
                      {favs.map((f) => {
                        const dist = loc ? haversine(loc, { lat: f.y, lng: f.x }) : null;
                        return (
                          <li key={f.place_id} className="dash-b flex items-center gap-2 py-2.5">
                            <button onClick={() => showFavDetail(f)} className="flex-1 min-w-0 text-left">
                              <div className="flex items-center gap-2">
                                <span className="font-semibold truncate text-sm">{f.place_name}</span>
                                {dist != null && <span className="text-xs stamp-text font-semibold shrink-0 ml-auto">{fmtDistance(dist)}</span>}
                              </div>
                              {f.note && <p className="text-xs muted mt-0.5 truncate">📝 {f.note}</p>}
                            </button>
                            <button onClick={() => removeFav(f.place_id)} className="text-lg leading-none shrink-0">⭐</button>
                          </li>
                        );
                      })}
                    </ul>
                  )}
                </div>
              )}
            </div>

          {/* 메뉴 보기 — 카카오맵 페이지를 앱 밖으로 나가지 않고 그대로 띄움 */}

          {menuUrl && (
            <div className="fixed inset-0 flex flex-col" style={{ zIndex: 100, background: "var(--paper)" }}>
              <div className="flex items-center justify-between px-4 py-2.5 dash-b shrink-0" style={{ background: "var(--paper)" }}>
                <span className="text-sm font-bold">🍽️ 메뉴</span>
                <button onClick={() => setMenuUrl(null)} className="text-xl leading-none muted hover:opacity-70">✕</button>
              </div>
              <iframe src={menuUrl} title="메뉴" className="flex-1 w-full" style={{ border: 0 }} />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
